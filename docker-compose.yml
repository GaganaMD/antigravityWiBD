version: "3.9"

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ai_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ai_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped