version: "3.9"

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ai_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - whatsapp
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ai_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

  whatsapp:
    build:
      context: .
      dockerfile: Dockerfile.whatsapp
    container_name: whatsapp_bridge
    stdin_open: true
    tty: true
    restart: unless-stopped